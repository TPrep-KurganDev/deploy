name: Update tags

on:
  workflow_dispatch:
    inputs:
      backend_version:
        description: 'Backend version (e.g. 1.0, 2.5)'
        required: false
      frontend_version:
        description: 'Frontend version (e.g. 1.0, 2.5)'
        required: false

jobs:
  update-env-file:
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Debug - Check key format (DELETE AFTER)
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | head -n 3
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tail -n 3
      - name: Update .env file on server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            ENV_FILE="/deploy/.env"

            if [ ! -f "$ENV_FILE" ]; then
              echo "Файл $ENV_FILE не найден!"
              exit 1
            fi

            if grep -q "^BACKEND_VERSION=" "$ENV_FILE"; then
              sed -i "s/^BACKEND_VERSION=.*/BACKEND_VERSION=${{ inputs.backend_version }}/" "$ENV_FILE"
            else
              echo "BACKEND_VERSION=${{ inputs.backend_version }}" >> "$ENV_FILE"
            fi

            if grep -q "^FRONTEND_VERSION=" "$ENV_FILE"; then
              sed -i "s/^FRONTEND_VERSION=.*/FRONTEND_VERSION=${{ inputs.frontend_version }}/" "$ENV_FILE"
            else
              echo "FRONTEND_VERSION=${{ inputs.frontend_version }}" >> "$ENV_FILE"
            fi
            
            echo "✅ Обновлён .env файл:"
            grep -E "^(BACKEND_VERSION|FRONTEND_VERSION)=" "$E
