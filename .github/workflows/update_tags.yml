name: Update .env Versions

on:
  workflow_dispatch:
    inputs:
      backend_version:
        description: 'Backend version'
        required: false
      frontend_version:
        description: 'Frontend version'
        required: false

jobs:
  update-env:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Update .env on Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key_path: ~/.ssh/id_ed25519
          port: 22
          script: |
            ENV_FILE="/deploy/.env"
            if [ ! -f "$ENV_FILE" ]; then
              echo "❌ Файл $ENV_FILE не найден!"
              exit 1
            fi

            sed -i "s/^BACKEND_VERSION=.*/BACKEND_VERSION=${{ inputs.backend_version }}/" "$ENV_FILE"
            sed -i "s/^FRONTEND_VERSION=.*/FRONTEND_VERSION=${{ inputs.frontend_version }}/" "$ENV_FILE"

            echo "✅ Обновлён .env файл:"
            grep -E "^(BACKEND_VERSION|FRONTEND_VERSION)=" "$ENV_FILE"
